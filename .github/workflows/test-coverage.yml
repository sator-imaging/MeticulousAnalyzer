name: 'Test and Coverage Report'

on:
  push:
    branches: [ main ]
    paths: [ "**/*.cs", "**/*.csproj", "**/*.props", "**/*.slnx" ]
  pull_request:
    paths: [ "**/*.cs", "**/*.csproj", "**/*.props", "**/*.slnx" ]
  workflow_dispatch:

env:
  TEST_PROJECT: ./test
  TEST_OUTPUT: TestResults
  REPORT_OUTPUT: CoverageReport

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current (PR or event target branch)
        uses: actions/checkout@v6
        with:
          path: current
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Checkout baseline (main branch)
        uses: actions/checkout@v6
        with:
          path: baseline
          ref: main
        if: github.event_name == 'pull_request'

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Test with coverage
        run: |
          set -e

          # Create baseline report first
          for dir in baseline current; do
            if [ -d "$dir" ]; then
              dotnet restore "$dir/$TEST_PROJECT"
              dotnet add "$dir/$TEST_PROJECT" package coverlet.collector

              dotnet test "$dir/$TEST_PROJECT" \
                --collect:"XPlat Code Coverage" \
                --results-directory "$dir/$TEST_OUTPUT" \
                || [ "$dir" == "baseline" ]  # Ignore error on main branch
            fi
          done

      - name: Generate coverage report
        run: |
          generate_report () {
            local target_dir="$1"
            local out_dir="$2"
            local title="$3"
            local history_dir="$4"

            local -a report_opts=()

            if [ -n "$history_dir" ]; then
              report_opts+=("-historydir:$history_dir")
            fi

            reportgenerator \
              -reporttypes:"Html;MarkdownSummary;MarkdownSummaryGithub" \
              -reports:"$target_dir/$TEST_OUTPUT/**/coverage.cobertura.xml" \
              "${report_opts[@]}" \
              -targetdir:"$out_dir"

            FILE_COUNT=$(find "$target_dir" -type f | wc -l | tr -d ' ' | numfmt --grouping)
            LINE_COUNT=$(find "$target_dir" -type f -exec cat {} + | wc -l | tr -d ' ' | numfmt --grouping)

            {
            sed \
              -e 's/<details open>/<details>/g' \
              -e 's|- \([0-9.]+%\)</summary>|- <b>\1</b></summary>|g' \
              -e "s/^# Summary$/# 📊 $title/" \
              "$out_dir/SummaryGithub.md"

              echo
              echo "Total file count: $FILE_COUNT  "
              echo "Total line count: $LINE_COUNT"
              echo
            } >> "$GITHUB_STEP_SUMMARY"
          }

          dotnet tool install -g dotnet-reportgenerator-globaltool

          if [ ! -d "baseline/$TEST_OUTPUT" ]; then
            {
              echo "⚠ Baseline test for coverage diff generation was failed or skipped."
              echo
            } >> $GITHUB_STEP_SUMMARY
          else
            generate_report baseline "$REPORT_OUTPUT/diff" "PR Changes" \
              "current/$TEST_OUTPUT/**/coverage.cobertura.xml"
          fi

          generate_report current "$REPORT_OUTPUT/full" "Total Coverage" ""
