name: '[push,PR] Test Coverage'

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  TEST_PROJECT: src/StaticMemberAnalyzer.Test
  TEST_OUTPUT: TestResults
  REPORT_OUTPUT: CoverageReport

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Required for worktree
          path: current

      - if: github.ref != 'refs/heads/main'
        run: |
          cd current
          git fetch origin main
          git worktree add ../baseline origin/main

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Test with coverage
        run: |
          set -e

          # Create baseline report first
          for dir in baseline current; do
            if [ -d "$dir" ]; then
              dotnet restore "$dir/$TEST_PROJECT"
              dotnet add "$dir/$TEST_PROJECT" package coverlet.collector

              dotnet test "$dir/$TEST_PROJECT" \
                --collect:"XPlat Code Coverage" \
                --results-directory "$dir/$TEST_OUTPUT"
            fi
          done

      - name: Generate coverage report
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool

          reportDir="$TEST_OUTPUT/**/coverage.cobertura.xml"
          reportTypes="Html;MarkdownSummary;MarkdownSummaryGithub"

          if [ -d baseline ]; then
            reportgenerator \
              -reporttypes:"$reportTypes" \
              -reports:"current/$reportDir" \
              -historydir:"baseline/$reportDir" \
              -targetdir:"$REPORT_OUTPUT/diff"
            {
              cat "$REPORT_OUTPUT/diff/SummaryGithub.md" \
                | sed 's/^# Summary$/# 📊 PR Changes/'
              echo
            } >> $GITHUB_STEP_SUMMARY
          fi

          reportgenerator \
            -reporttypes:"$reportTypes" \
            -reports:"current/$reportDir" \
            -targetdir:"$REPORT_OUTPUT/full"
          cat "$REPORT_OUTPUT/full/SummaryGithub.md" \
            | sed 's/^# Summary$/# 📊 Total Coverage/' \
            >> $GITHUB_STEP_SUMMARY
