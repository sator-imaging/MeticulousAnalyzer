name: '[push,PR] Test Coverage'

on:
  push:
  pull_request:

env:
  TEST_PROJECT: ./src/StaticMemberAnalyzer.Test
  TEST_OUTPUT: ./TestResults
  COV_OUTDIR: ./coveragereport

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - run: dotnet restore $TEST_PROJECT

      - name: Test with coverage
        run: |
          dotnet add $TEST_PROJECT package coverlet.collector

          dotnet test $TEST_PROJECT \
            --collect:"XPlat Code Coverage" \
            --results-directory $TEST_PROJECT

      - name: Generate coverage report
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool

          reportgenerator \
            -reports:"$TEST_PROJECT/**/coverage.cobertura.xml" \
            -targetdir:"$COV_OUTDIR" \
            -reporttypes:"Html;MarkdownSummary"

      - run: cat "$COV_OUTDIR/Summary.md" >> $GITHUB_STEP_SUMMARY

      #- uses: actions/upload-artifact@v7
      #  with:
      #    name: coverage-report
      #    path: ${{ env.COV_OUTDIR }}
