name: Auto Labeler

on:
  pull_request:
    types: [closed]

permissions:
  pull-requests: write
  issues: write

jobs:
  label:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-slim

    steps:
      - name: Add labels based on Conventional Commits
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MERGE_COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ## Labels chosen for GH Release Notes Generation

          COMMIT_TITLE=$(gh api \
            repos/$REPO/commits/$MERGE_COMMIT_SHA \
            --jq '.commit.message | split("\n")[0]')

          echo "PR title: $PR_TITLE"
          echo "Merge commit title: $COMMIT_TITLE"

          matches_pattern() {
            local pattern="$1"

            echo "$PR_TITLE" | grep -qE "$pattern" \
            || echo "$COMMIT_TITLE" | grep -qE "$pattern"
          }


          labels=()

          if matches_pattern '^fix[:(]'; then
            labels+=("bug")
          fi

          if matches_pattern '^feat[:(]'; then
            labels+=("enhancement")
          fi

          if matches_pattern '^docs[:(]'; then
            labels+=("documentation")
          fi

          if matches_pattern '^[a-z]+(\(.+\))?!:'; then
            labels+=("breaking-change")
          fi


          if [ ${#labels[@]} -eq 0 ]; then
            echo "::warning::No release-note label detected. PR title='$PR_TITLE' commit title='$COMMIT_TITLE'"
          fi

          for label in "${labels[@]}"; do
            gh issue edit "$PR_NUMBER" \
              --repo "$REPO" \
              --add-label "$label"
          done
